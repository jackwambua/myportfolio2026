<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login | WPLS</title>

  <link rel="stylesheet" href="assets/css/style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/icons/favicon.png" />
</head>

<body>

<!-- ================= HEADER ================= -->

<header class="header">

  <nav class="navbar container">

    <div class="logo">
      <img src="assets/icons/logo.png" alt="WPLS Logo">
    </div>

    <ul class="nav-links" id="navLinks">

      <li><a href="index.html">Home</a></li>

      <li><a href="about.html">About</a></li>

      <li><a href="courses.html">Courses</a></li>

      <li><a href="contact.html">Contact</a></li>

      <li><a href="login.html" class="btn-nav active">Login</a></li>

    </ul>

    <div class="hamburger" id="hamburger">☰</div>

  </nav>

</header>

<!-- ================= LOGIN SECTION ================= -->

<section class="hero">

  <div class="container">

    <div class="feature-card" style="max-width:500px; margin:auto;">

      <h1 style="margin-bottom:2rem; text-align:center;">
        WPLS Portal Login
      </h1>

      <form id="loginForm">

        <div style="margin-bottom:1rem;">

          <input 
            type="email"
            placeholder="Email Address"
            required
            style="width:100%; padding:1rem;"
          >

        </div>

        <div style="margin-bottom:1rem;">

          <input 
            type="password"
            placeholder="Password"
            required
            style="width:100%; padding:1rem;"
          >

        </div>

        <div style="margin-bottom:1.5rem;">

          <select 
            id="role"
            required
            style="width:100%; padding:1rem;"
          >

            <option value="">Select Role</option>

            <option value="admin">Admin</option>

            <option value="student">Student</option>

          </select>

        </div>

        <button 
          type="submit"
          class="btn-primary"
          style="width:100%;"
        >
          Login
        </button>

      </form>

    </div>

  </div>

</section>

<!-- ================= FOOTER ================= -->

<footer class="footer">

  <div class="container footer-content">

    <div>

      <h2>WPLS</h2>

      <p>
        Empowering students through multilingual education.
      </p>

    </div>

    <div>

      <h3>Quick Links</h3>

      <ul>

        <li><a href="index.html">Home</a></li>

        <li><a href="courses.html">Courses</a></li>

        <li><a href="about.html">About</a></li>

      </ul>

    </div>

    <div>

      <h3>Contact</h3>

      <p>Email: info@wpls.com</p>

      <p>Phone: +254 758 412 799</p>

    </div>

  </div>

  <div class="footer-bottom">

    <p>
      © 2026 WPLS. All Rights Reserved.
    </p>

  </div>

</footer>

<!-- ================= SCRIPTS ================= -->

<script src="assets/js/script.js"></script>

<script>

const loginForm = document.getElementById("loginForm");

loginForm.addEventListener("submit", function(e) {

  e.preventDefault();

  const role = document.getElementById("role").value;

  if(role === "admin") {

    window.location.href = "admin/dashboard.html";

  }

  else if(role === "student") {

    window.location.href = "student/dashboard.html";

  }

  else {

    alert("Please select a role");

  }

});

</script>

</body>
</html>
